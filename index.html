<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vanessa Souza dos Santos — Portfólio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f6f6f3;
    --bg-2: #eeeeea;
    --paper: #ffffff;
    --ink: #14151a;
    --ink-2: #3a3b42;
    --muted: #8a8a8f;
    --line: #e7e6e0;
    --line-2: #d4d2c9;
    --accent: #2e3a8c;
    --accent-ink: #1f2766;
    --accent-soft: #eef0fa;
    --serif: "Instrument Serif", "Newsreader", Georgia, serif;
    --reader: "Newsreader", Georgia, serif;
    --sans: "Geist", system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent); color: var(--paper); }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }

  /* ── Layout ─────────────────────────────────────────── */
  .shell { max-width: 1240px; margin: 0 auto; padding: 0 40px; }
  @media (max-width: 700px) { .shell { padding: 0 22px; } }

  .mono { font-family: var(--mono); font-feature-settings: "ss01"; letter-spacing: 0.01em; }
  .serif { font-family: var(--serif); }
  .small-caps {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .rule { height: 1px; background: var(--line); border: none; margin: 0; }

  /* ── Top bar ────────────────────────────────────────── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in oklab, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 60px; gap: 16px;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand .name { font-family: var(--serif); font-size: 22px; line-height: 1; letter-spacing: -0.01em; }
  .brand .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .brand .role { font-size: 12px; color: var(--muted); }
  .nav { display: flex; gap: 26px; }
  .nav a {
    font-size: 13px; color: var(--ink-2); position: relative; padding: 4px 0;
    transition: color .15s ease;
  }
  .nav a:hover { color: var(--accent); }
  .nav a::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -2px;
    height: 1px; background: var(--accent); transform: scaleX(0);
    transform-origin: left; transition: transform .25s ease;
  }
  .nav a:hover::after { transform: scaleX(1); }
  @media (max-width: 720px) { .nav { display: none; } }

  /* ── Hero ───────────────────────────────────────────── */
  .hero { padding: 80px 0 110px; position: relative; }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 56px;
    align-items: end;
  }
  @media (max-width: 900px) { .hero-grid { grid-template-columns: 1fr; gap: 36px; } .hero { padding: 56px 0 70px; } }

  .hero h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(64px, 10.4vw, 168px);
    line-height: 0.9;
    letter-spacing: -0.025em;
    margin: 18px 0 0;
    color: var(--ink);
  }
  .hero h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
  .hero-meta {
    display: flex; gap: 26px; flex-wrap: wrap; margin-top: 32px;
    color: var(--ink-2);
  }
  .hero-meta b { font-weight: 500; color: var(--ink); }
  .lede {
    font-family: var(--reader);
    font-size: 20px;
    line-height: 1.55;
    color: var(--ink-2);
    max-width: 38ch;
    font-weight: 400;
  }
  .lede strong { color: var(--ink); font-weight: 500; }

  .stats {
    margin-top: 80px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .stats > div {
    padding: 22px 24px;
    border-right: 1px solid var(--line);
  }
  .stats > div:last-child { border-right: none; }
  .stats .v { font-family: var(--serif); font-size: 38px; line-height: 1; letter-spacing: -0.01em; }
  .stats .l { font-size: 12px; color: var(--muted); margin-top: 8px; max-width: 22ch; }
  @media (max-width: 800px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .stats > div:nth-child(2) { border-right: none; }
    .stats > div:nth-child(1), .stats > div:nth-child(2) { border-bottom: 1px solid var(--line); }
  }

  /* ── Section headers ─────────────────────────────────── */
  section { padding: 90px 0; border-top: 1px solid var(--line); }
  .sec-head {
    display: grid; grid-template-columns: 200px 1fr; gap: 40px;
    margin-bottom: 48px; align-items: end;
  }
  @media (max-width: 800px) { .sec-head { grid-template-columns: 1fr; gap: 12px; } }
  .sec-head h2 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(38px, 5vw, 56px);
    line-height: 1; letter-spacing: -0.01em;
    margin: 0;
  }
  .sec-head .blurb {
    font-family: var(--reader);
    font-size: 17px;
    color: var(--ink-2);
    max-width: 56ch;
  }

  /* ── Cases ──────────────────────────────────────────── */
  .cases {
    display: grid; grid-template-columns: 1fr 1fr; gap: 28px;
  }
  @media (max-width: 820px) { .cases { grid-template-columns: 1fr; } }

  .case {
    display: flex; flex-direction: column;
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 36px 32px 32px;
    cursor: pointer;
    position: relative;
    transition: border-color .25s ease, transform .35s ease, box-shadow .35s ease;
    text-align: left;
    min-height: 300px;
    border-radius: 2px;
  }
  .case:hover {
    border-color: var(--ink);
    transform: translateY(-2px);
    box-shadow: 0 24px 40px -28px rgba(20, 21, 26, 0.25);
  }
  .case::before {
    content: "";
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 2px; background: var(--accent);
    transform: scaleY(0); transform-origin: top;
    transition: transform .35s ease;
  }
  .case:hover::before { transform: scaleY(1); }
  .case:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; }
  .case-top {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 22px;
  }
  .case-top .idx { font-family: var(--mono); color: var(--muted); font-size: 12px; letter-spacing: 0.12em; }
  .case-top .yr { font-family: var(--mono); color: var(--muted); font-size: 12px; }

  .case h3 {
    font-family: var(--serif); font-weight: 400;
    font-size: 32px; line-height: 1.05; letter-spacing: -0.01em;
    margin: 0 0 8px;
  }
  .case .kind { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 18px; }
  .case .desc {
    font-family: var(--reader); font-size: 16px; color: var(--ink-2);
    line-height: 1.5; flex: 1;
  }
  .case-tags {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 18px;
  }
  .tag {
    font-family: var(--mono); font-size: 10.5px;
    color: var(--ink-2); border: 1px solid var(--line);
    padding: 4px 9px; border-radius: 999px;
    background: var(--paper);
    letter-spacing: 0.02em;
  }
  .case-cta {
    display: flex; align-items: center; gap: 8px;
    margin-top: 24px; color: var(--accent);
    font-size: 13px;
    letter-spacing: 0.02em;
  }
  .case-cta svg { transition: transform .25s ease; }
  .case:hover .case-cta svg { transform: translateX(4px); }

  /* ── Modal ─────────────────────────────────────────── */
  .modal-back {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(20, 18, 14, 0.5);
    backdrop-filter: blur(4px);
    display: flex; justify-content: center; align-items: flex-start;
    padding: 60px 20px;
    overflow-y: auto;
    animation: fade .2s ease;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--paper);
    max-width: 1040px; width: 100%;
    border: 1px solid var(--line);
    position: relative;
    border-radius: 4px;
    box-shadow: 0 40px 80px -20px rgba(20, 21, 26, 0.4);
    animation: rise .25s cubic-bezier(.2,.7,.3,1);
  }
  @keyframes rise { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-close {
    position: absolute; top: 18px; right: 18px;
    width: 36px; height: 36px; display: grid; place-items: center;
    border: 1px solid var(--line); border-radius: 50%;
    background: var(--paper); z-index: 2;
  }
  .modal-close:hover { background: var(--bg); border-color: var(--ink); }
  .modal-hero {
    padding: 56px 56px 38px;
    border-bottom: 1px solid var(--line);
  }
  @media (max-width: 700px) { .modal-hero { padding: 36px 24px 24px; } }
  .modal-hero .row {
    display: flex; gap: 16px; align-items: center; margin-bottom: 18px;
    color: var(--muted); font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em;
  }
  .modal-hero h2 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(34px, 5vw, 56px);
    line-height: 1; letter-spacing: -0.015em;
    margin: 6px 0 16px;
  }
  .modal-hero .client {
    font-size: 15px; color: var(--ink-2);
  }
  .modal-hero .summary {
    font-family: var(--reader); font-size: 19px; line-height: 1.5;
    color: var(--ink-2); margin-top: 22px; max-width: 68ch;
  }
  .modal-metrics {
    display: grid; grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--line);
  }
  .modal-metrics > div {
    padding: 24px 28px;
    border-right: 1px solid var(--line);
  }
  .modal-metrics > div:last-child { border-right: none; }
  .modal-metrics .v {
    font-family: var(--serif); font-size: 30px; line-height: 1;
  }
  .modal-metrics .l {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.1em;
    color: var(--muted); text-transform: uppercase; margin-bottom: 10px;
  }
  .modal-metrics .s { font-size: 12px; color: var(--muted); margin-top: 8px; }
  @media (max-width: 800px) {
    .modal-metrics { grid-template-columns: repeat(2, 1fr); }
    .modal-metrics > div:nth-child(2) { border-right: none; }
    .modal-metrics > div:nth-child(-n+2) { border-bottom: 1px solid var(--line); }
  }

  .modal-body { padding: 48px 56px 56px; }
  @media (max-width: 700px) { .modal-body { padding: 32px 24px 40px; } }
  .modal-body > .modal-section { margin-bottom: 36px; }
  .modal-section h3 {
    font-family: var(--serif); font-weight: 400;
    font-size: 26px; letter-spacing: -0.01em;
    margin: 0 0 14px;
  }
  .modal-section p {
    font-family: var(--reader); font-size: 17px; line-height: 1.6;
    color: var(--ink-2); margin: 0; max-width: 70ch;
  }
  .modal-section ul {
    list-style: none; padding: 0; margin: 0;
  }
  .modal-section li {
    font-family: var(--reader); font-size: 16.5px; line-height: 1.5;
    color: var(--ink-2); padding: 10px 0 10px 22px;
    border-top: 1px solid var(--line);
    position: relative;
  }
  .modal-section li:first-child { border-top: none; }
  .modal-section li::before {
    content: ""; position: absolute; left: 0; top: 19px;
    width: 10px; height: 1px; background: var(--accent);
  }
  .modal-stack {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px;
  }
  .modal-foot {
    border-top: 1px solid var(--line); padding-top: 22px;
    margin-top: 28px;
    font-size: 13px; color: var(--muted);
    font-style: italic; max-width: 70ch;
  }

  /* ── Experience ─────────────────────────────────────── */
  .xp { display: grid; grid-template-columns: 200px 1fr; gap: 40px; }
  @media (max-width: 800px) { .xp { grid-template-columns: 1fr; } }
  .xp-list { display: flex; flex-direction: column; }
  .xp-item {
    display: grid; grid-template-columns: 140px 1fr;
    gap: 40px; padding: 26px 0;
    border-top: 1px solid var(--line);
  }
  .xp-item:last-child { border-bottom: 1px solid var(--line); }
  @media (max-width: 700px) { .xp-item { grid-template-columns: 1fr; gap: 6px; } }
  .xp-year { font-family: var(--mono); font-size: 13px; color: var(--muted); padding-top: 4px; }
  .xp-role { font-family: var(--serif); font-size: 26px; line-height: 1.1; letter-spacing: -0.005em; }
  .xp-org { font-size: 14px; color: var(--ink-2); margin-top: 4px; }
  .xp-org .where { color: var(--muted); }
  .xp-bullets {
    margin-top: 14px; padding: 0; list-style: none;
    font-family: var(--reader);
    font-size: 16px; line-height: 1.5; color: var(--ink-2);
  }
  .xp-bullets li { padding-left: 18px; position: relative; margin: 6px 0; }
  .xp-bullets li::before {
    content: "·"; position: absolute; left: 4px; top: -3px;
    color: var(--accent); font-size: 22px;
  }

  /* ── Skills ─────────────────────────────────────────── */
  .skills { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .skill-col { padding: 26px 28px; border-right: 1px solid var(--line); }
  .skill-col:last-child { border-right: none; }
  .skill-col h4 {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em;
    color: var(--muted); text-transform: uppercase;
    margin: 0 0 18px;
  }
  .skill-col ul { list-style: none; padding: 0; margin: 0; }
  .skill-col li {
    font-family: var(--reader); font-size: 16px;
    padding: 7px 0; border-bottom: 1px dashed var(--line);
    color: var(--ink);
  }
  .skill-col li:last-child { border-bottom: none; }
  @media (max-width: 900px) {
    .skills { grid-template-columns: repeat(2, 1fr); }
    .skill-col:nth-child(2) { border-right: none; }
    .skill-col:nth-child(-n+2) { border-bottom: 1px solid var(--line); }
  }

  /* ── Contact ────────────────────────────────────────── */
  .contact {
    padding: 110px 0 130px;
    border-top: 1px solid var(--line);
    text-align: center;
  }
  .contact h2 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(50px, 8vw, 110px);
    line-height: 0.95; letter-spacing: -0.02em;
    margin: 0;
  }
  .contact h2 em { color: var(--accent); font-style: italic; }
  .contact .cta {
    display: inline-flex; align-items: center; gap: 12px;
    margin-top: 40px;
    padding: 16px 30px;
    border: 1px solid var(--accent);
    color: var(--paper);
    background: var(--accent);
    border-radius: 999px;
    font-size: 15px;
    letter-spacing: 0.01em;
    transition: background .25s, color .25s, transform .25s, box-shadow .25s;
    box-shadow: 0 6px 24px -10px rgba(46, 58, 140, 0.45);
  }
  .contact .cta:hover { background: var(--accent-ink); border-color: var(--accent-ink); transform: translateY(-1px); }
  .contact-info {
    margin-top: 28px;
    display: flex; gap: 32px; justify-content: center; flex-wrap: wrap;
    font-family: var(--mono); font-size: 12.5px;
    color: var(--muted); letter-spacing: 0.04em;
  }
  .contact-info a:hover { color: var(--accent); }

  footer {
    padding: 26px 0 38px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--mono); font-size: 11px;
    color: var(--muted); letter-spacing: 0.06em;
  }

  body.modal-open { overflow: hidden; }
</style>
</head>
<body style="font-family: Helvetica">
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="cases.jsx"></script>

<script type="text/babel">


const { useState, useEffect, useCallback } = React;

function ArrowRight({ size = 14 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5">
      <path d="M4 10 H16 M11 5 L16 10 L11 15" strokeLinecap="round" strokeLinejoin="round" />
    </svg>);

}

function CaseCard({ c, onOpen }) {
  return (
    <button className="case" onClick={() => onOpen(c)}>
      <div className="case-top">
        <span className="idx">{c.index} / Caso</span>
        <span className="yr">{c.year}</span>
      </div>
      <h3>{c.title}</h3>
      <div className="kind">{c.kind}</div>
      <div className="desc">{c.summary}</div>
      <div className="case-tags">
        {c.stack.slice(0, 4).map((s) => <span key={s} className="tag">{s}</span>)}
      </div>
      <div className="case-cta">
        Ver detalhes <ArrowRight />
      </div>
    </button>);

}

function CaseModal({ c, onClose }) {
  useEffect(() => {
    document.body.classList.add("modal-open");
    const onKey = (e) => {if (e.key === "Escape") onClose();};
    window.addEventListener("keydown", onKey);
    return () => {
      document.body.classList.remove("modal-open");
      window.removeEventListener("keydown", onKey);
    };
  }, [onClose]);

  return (
    <div className="modal-back" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose} aria-label="Fechar">
          <svg width="14" height="14" viewBox="0 0 14 14" stroke="currentColor" strokeWidth="1.5"><path d="M1 1 L13 13 M13 1 L1 13" strokeLinecap="round" /></svg>
        </button>
        <div className="modal-hero">
          <div className="row">
            <span>Caso {c.index}</span><span>·</span><span>{c.year}</span><span>·</span><span>{c.kind}</span>
          </div>
          <h2>{c.title}</h2>
          <p className="summary">{c.summary}</p>
        </div>
        <div className="modal-metrics">
          {c.metrics.map((m) =>
          <div key={m.label}>
              <div className="l">{m.label}</div>
              <div className="v">{m.value}</div>
              <div className="s">{m.sub}</div>
            </div>
          )}
        </div>
        <div className="modal-body">
          {c.sections.map((s, i) =>
          <div key={i} className="modal-section">
              <h3>{s.h}</h3>
              {s.p && <p>{s.p}</p>}
              {s.list &&
            <ul>{s.list.map((x, j) => <li key={j}>{x}</li>)}</ul>
            }
            </div>
          )}
          <div className="modal-section">
            <h3>Stack</h3>
            <div className="modal-stack" style={{ marginTop: 4 }}>
              {c.stack.map((s) => <span key={s} className="tag">{s}</span>)}
            </div>
          </div>
        </div>
      </div>
    </div>);

}

function App() {
  const [open, setOpen] = useState(null);
  const handleOpen = useCallback((c) => setOpen(c), []);
  const handleClose = useCallback(() => setOpen(null), []);

  return (
    <>
      <header className="topbar">
        <div className="shell topbar-inner">
          <div className="brand">
            <span className="dot"></span>
            <span className="name">Vanessa Santos</span>
            <span className="role">· Analista de Dados</span>
          </div>
          <nav className="nav">
            <a href="#trabalho">Trabalho</a>
            <a href="#experiencia">Experiência</a>
            <a href="#ferramentas">Ferramentas</a>
            <a href="#contato">Contato</a>
          </nav>
        </div>
      </header>

      <main>
        {/* HERO */}
        <section className="hero" style={{ borderTop: "none", padding: "80px 0 90px" }}>
          <div className="shell">
            <div className="hero-grid">
              <div>
                <div className="small-caps">Portfólio · Rio de Janeiro · 2026</div>
                <h1 style={{ color: "rgb(46, 58, 140)" }}>
